version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Node & npm versions"
      - node -v && npm -v
      - echo "Checking lockfile..."
      - |
        if [ ! -f package-lock.json ]; then
          echo "❌ package-lock.json absent -> using npm install (no audit/fund)"
          npm install --no-audit --no-fund
        else
          echo "✅ lockfile present -> running npm ci (no audit/fund)"
          # Use legacy peer deps to avoid peer resolution failures in CI
          export NPM_CONFIG_LEGACY_PEER_DEPS=true
          # Increase verbosity to capture errors in CodeBuild logs
          npm ci --no-audit --no-fund --verbose || (echo "npm ci failed, dumping npm logs if any..." && ls -la /root/.npm/_logs || true && exit 1)
        fi

  pre_build:
    commands:
      - echo "Running unit tests..."
      - npm run test:unit
      - echo "Running integration tests..."
      - npm run test:integration

  build:
    commands:
      - echo "Preparing production package (omit devDependencies)..."
      - npm prune --omit=dev
      - rm -rf node_modules
      - echo "Creating deployment zip (src + package.json + node_modules)..."
      - zip -r build.zip src package.json package-lock.json node_modules -x "tests/*" "*.map" ".git/*" ".github/*"

cache:
  paths:
    - '/root/.npm/**/*'
    -
artifacts:
  files:
    - build.zip
  discard-paths: yes

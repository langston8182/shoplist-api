version: 0.2

phases:
  install:
    runtime-versions:
      nodejs: 22
    commands:
      - echo "Installing dependencies (all) for tests..."
      - npm ci

  pre_build:
    commands:
      - echo "Running unit tests..."
      - npm run test:unit
      - echo "Running integration tests..."
      - npm run test:integration

  build:
    commands:
      - echo "Preparing production package (omit devDependencies)..."
      # Reinstall only production deps to shrink the artifact
      - rm -rf node_modules
      - npm ci --omit=dev
      - echo "Creating deployment zip (src + package.json + node_modules)..."
      # Adjust the list below if your handler files are not under src/
      - zip -r build.zip src package.json package-lock.json node_modules -x "tests/*" "*.map" ".git/*" ".github/*"

  post_build:
    commands:
      - echo "Updating Lambda function code with zipped artifact..."
      - |
        FUNCTION_NAME=${FUNCTION_NAME}
        REGION=${REGION}
        aws lambda update-function-code \
          --function-name "$FUNCTION_NAME" \
          --region "$REGION" \
          --zip-file fileb://build.zip

artifacts:
  type: zip
  files:
    - build.zip
  discard-paths: yes
